<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lista de Compras</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0102;
      --surface:   #5d4343;
      --border:    #5b4141;
      --accent:    #f0c060;
      --accent2:   #e07b40;
      --green:     #5ec98a;
      --red:       #e05c5c;
      --text:      #e8e6e0;
      --muted:     #888580;
      --radius:    14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 0 0 60px;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(240,192,96,.08) 0%, transparent 60%);
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      padding: 52px 24px 32px;
    }
    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 8px;
    }
    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-size: 22px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline {
      color: var(--muted);
      font-size: .9rem;
      font-weight: 300;
      letter-spacing: .5px;
    }

    /* ── LAYOUT ── */
    .container { max-width: 900px; margin: 0 auto; padding: 0 20px; }

    /* ── FORM CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 28px 24px;
      margin-bottom: 28px;
    }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .form-grid .span2 { grid-column: span 2; }
    label {
      display: block;
      font-size: .78rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: 6px;
    }
    input, textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      padding: 11px 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(240,192,96,.12);
    }
    textarea { resize: vertical; min-height: 72px; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(.6); cursor: pointer; }

    .btn {
      border: none;
      border-radius: 9px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: .9rem;
      padding: 11px 22px;
      transition: transform .15s, opacity .15s, box-shadow .15s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0e0f11;
      letter-spacing: .3px;
    }
    .btn-primary:hover { box-shadow: 0 4px 20px rgba(240,192,96,.3); }
    .btn-sm {
      padding: 6px 14px;
      font-size: .8rem;
      border-radius: 7px;
    }
    .btn-complete {
      background: rgba(94,201,138,.12);
      color: var(--green);
      border: 1px solid rgba(94,201,138,.25);
    }
    .btn-complete:hover { background: rgba(94,201,138,.22); }
    .btn-delete {
      background: rgba(224,92,92,.1);
      color: var(--red);
      border: 1px solid rgba(224,92,92,.2);
    }
    .btn-delete:hover { background: rgba(224,92,92,.2); }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 11px;
      padding: 5px;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: .88rem;
      font-weight: 500;
      color: var(--muted);
      transition: all .2s;
      user-select: none;
    }
    .tab.active {
      background: linear-gradient(135deg, rgba(240,192,96,.15), rgba(224,123,64,.1));
      color: var(--accent);
      border: 1px solid rgba(240,192,96,.2);
    }
    .tab:not(.active):hover { color: var(--text); }

    /* ── ITEMS LIST ── */
    #items-list { display: flex; flex-direction: column; gap: 12px; }

    .item-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      animation: slideIn .25s ease;
      transition: border-color .2s;
    }
    .item-card:hover { border-color: rgba(240,192,96,.2); }
    .item-card.completed { opacity: .65; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item-check {
      width: 26px; height: 26px; flex-shrink: 0;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: grid;
      place-items: center;
      margin-top: 2px;
      transition: all .2s;
    }
    .item-check.done {
      background: rgba(94,201,138,.15);
      border-color: var(--green);
      color: var(--green);
    }

    .item-body { flex: 1; min-width: 0; }
    .item-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .item-name.done { text-decoration: line-through; color: var(--muted); }
    .item-desc { font-size: .85rem; color: var(--muted); margin-bottom: 8px; line-height: 1.5; }
    .item-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .75rem;
      color: var(--muted);
    }
    .badge {
      padding: 2px 9px;
      border-radius: 20px;
      font-size: .72rem;
      font-weight: 500;
    }
    .badge-pending  { background: rgba(240,192,96,.12); color: var(--accent); }
    .badge-done     { background: rgba(94,201,138,.12); color: var(--green); }

    .item-actions { display: flex; gap: 8px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 52px 24px;
      color: var(--muted);
    }
    .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--text); margin-bottom: 6px; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 20px;
      font-size: .88rem;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
      transform: translateY(80px);
      opacity: 0;
      transition: all .3s ease;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-left: 3px solid var(--green); }
    #toast.error   { border-left: 3px solid var(--red); }

    /* ── STATS ROW ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      text-align: center;
    }
    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat-label { font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .7px; margin-top: 2px; }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-grid .span2 { grid-column: span 1; }
      .stats { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-row">
    <div class="logo-icon">🛒</div>
    <h1>Lista de Compras</h1>
  </div>
  <p class="tagline">Organiza tus compras con Node.js + MongoDB</p>
</header>

<div class="container">

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-pending">0</div>
      <div class="stat-label">Pendientes</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-done">0</div>
      <div class="stat-label">Completados</div>
    </div>
  </div>

  <!-- Formulario -->
  <div class="card">
    <div class="card-title">✦ Agregar a la lista</div>
    <div class="form-grid">
      <div>
        <label>Nombre *</label>
        <input type="text" id="inp-nombre" placeholder="Ej: Leche, Arroz…"/>
      </div>
      <div>
        <label>Fecha</label>
        <input type="date" id="inp-fecha"/>
      </div>
      <div class="span2">
        <label>Descripción</label>
        <textarea id="inp-desc" placeholder="Detalles opcionales (cantidad, marca, etc.)"></textarea>
      </div>
      <div class="span2" style="text-align:right">
        <button class="btn btn-primary" onclick="crearItem()">＋ Agregar item</button>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="cambiarTab('todos')">📋 Todos</div>
    <div class="tab" onclick="cambiarTab('pendientes')">⏳ Pendientes</div>
    <div class="tab" onclick="cambiarTab('completados')">✅ Completados</div>
  </div>

  <!-- Lista -->
  <div id="items-list">
    <div class="empty">
      <div class="empty-icon">🛍️</div>
      <div class="empty-title">Tu lista está vacía</div>
      <p>Agrega tu primer producto arriba</p>
    </div>
  </div>

</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  const API = '/api/items';
  let tabActual = 'todos';

  // ── Fecha por defecto: hoy
  document.getElementById('inp-fecha').valueAsDate = new Date();

  // ── Toast
  function toast(msg, tipo = 'success') {
    const el = document.getElementById('toast');
    el.textContent = (tipo === 'success' ? '✓ ' : '✗ ') + msg;
    el.className = `show ${tipo}`;
    clearTimeout(toast._t);
    toast._t = setTimeout(() => el.className = '', 3000);
  }

  // ── Cambiar pestaña
  function cambiarTab(tab) {
    tabActual = tab;
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', ['todos','pendientes','completados'][i] === tab);
    });
    cargarItems();
  }

  // ── Formatear fecha
  function fmtFecha(d) {
    return new Date(d).toLocaleDateString('es-PE', { day:'2-digit', month:'short', year:'numeric' });
  }

  // ── Cargar items
  async function cargarItems() {
    const url = tabActual === 'pendientes' ? `${API}/pendientes`
              : tabActual === 'completados' ? `${API}/completados`
              : API;
    try {
      const res  = await fetch(url);
      const json = await res.json();
      renderItems(json.data || []);
      actualizarStats();
    } catch {
      toast('Error al cargar los items', 'error');
    }
  }

  // ── Actualizar estadísticas
  async function actualizarStats() {
    try {
      const [todos, pend, comp] = await Promise.all([
        fetch(API).then(r => r.json()),
        fetch(`${API}/pendientes`).then(r => r.json()),
        fetch(`${API}/completados`).then(r => r.json()),
      ]);
      document.getElementById('stat-total').textContent   = todos.count ?? 0;
      document.getElementById('stat-pending').textContent = pend.count  ?? 0;
      document.getElementById('stat-done').textContent    = comp.count  ?? 0;
    } catch {}
  }

  // ── Renderizar items
  function renderItems(items) {
    const list = document.getElementById('items-list');
    if (!items.length) {
      list.innerHTML = `
        <div class="empty">
          <div class="empty-icon">${tabActual === 'completados' ? '🎉' : '🛍️'}</div>
          <div class="empty-title">${tabActual === 'completados' ? '¡Nada completado aún!' : 'Sin items aquí'}</div>
          <p>${tabActual === 'pendientes' ? '¡Todo al día!' : 'Agrega productos desde el formulario'}</p>
        </div>`;
      return;
    }
    list.innerHTML = items.map(item => `
      <div class="item-card ${item.esCompletado ? 'completed' : ''}" id="item-${item._id}">
        <div class="item-check ${item.esCompletado ? 'done' : ''}">
          ${item.esCompletado ? '✓' : ''}
        </div>
        <div class="item-body">
          <div class="item-name ${item.esCompletado ? 'done' : ''}">${escHtml(item.nombre)}</div>
          ${item.descripcion ? `<div class="item-desc">${escHtml(item.descripcion)}</div>` : ''}
          <div class="item-meta">
            <span>📅 ${fmtFecha(item.fecha)}</span>
            <span class="badge ${item.esCompletado ? 'badge-done' : 'badge-pending'}">
              ${item.esCompletado ? '✅ Completado' : '⏳ Pendiente'}
            </span>
          </div>
        </div>
        <div class="item-actions">
          ${!item.esCompletado ? `
            <button class="btn btn-sm btn-complete" onclick="completarItem('${item._id}')">✓ Completar</button>
          ` : ''}
          <button class="btn btn-sm btn-delete" onclick="eliminarItem('${item._id}')">✕</button>
        </div>
      </div>
    `).join('');
  }

  // ── Crear item
  async function crearItem() {
    const nombre = document.getElementById('inp-nombre').value.trim();
    const desc   = document.getElementById('inp-desc').value.trim();
    const fecha  = document.getElementById('inp-fecha').value;

    if (!nombre) { toast('El nombre es obligatorio', 'error'); return; }

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, descripcion: desc, fecha })
      });
      const json = await res.json();
      if (!json.success) throw new Error(json.message);

      document.getElementById('inp-nombre').value = '';
      document.getElementById('inp-desc').value   = '';
      document.getElementById('inp-fecha').valueAsDate = new Date();
      toast('Item agregado correctamente');
      cargarItems();
    } catch (e) {
      toast(e.message || 'Error al crear item', 'error');
    }
  }

  // ── Completar item
  async function completarItem(id) {
    try {
      const res  = await fetch(`${API}/${id}/completar`, { method: 'PATCH' });
      const json = await res.json();
      if (!json.success) throw new Error(json.message);
      toast('¡Item completado! 🎉');
      cargarItems();
    } catch (e) {
      toast(e.message || 'Error al completar', 'error');
    }
  }

  // ── Eliminar item
  async function eliminarItem(id) {
    if (!confirm('¿Eliminar este item?')) return;
    try {
      const res  = await fetch(`${API}/${id}`, { method: 'DELETE' });
      const json = await res.json();
      if (!json.success) throw new Error(json.message);
      toast('Item eliminado');
      cargarItems();
    } catch (e) {
      toast(e.message || 'Error al eliminar', 'error');
    }
  }

  // ── Escape HTML
  function escHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ── Enter en nombre
  document.getElementById('inp-nombre').addEventListener('keydown', e => {
    if (e.key === 'Enter') crearItem();
  });

  // ── Inicializar
  cargarItems();
</script>
</body>
</html>
