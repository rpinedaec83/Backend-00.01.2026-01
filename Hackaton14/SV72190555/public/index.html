<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat App — Hackathon 14</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2e3347;
      --accent: #6c63ff; --accent2: #a78bfa; --text: #e2e8f0; --text-muted: #8892a4;
      --danger: #ef4444; --success: #22c55e; --bot-bg: #2d1f00; --bot-color: #fde68a;
      --font: 'Segoe UI', system-ui, sans-serif; --radius: 12px;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* LOGIN */
    #login-screen { flex: 1; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at 60% 40%, #1e1b4b 0%, #0f1117 70%); }
    .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px 48px; width: 380px; display: flex; flex-direction: column; gap: 16px; }
    .login-card h1 { font-size: 26px; font-weight: 700; color: var(--accent2); }
    .login-card p { font-size: 13px; color: var(--text-muted); }
    input, textarea { width: 100%; padding: 11px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; font-family: var(--font); outline: none; transition: border-color 0.2s; }
    input:focus, textarea:focus { border-color: var(--accent); }
    .btn { padding: 11px 20px; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; transition: opacity 0.2s, transform 0.1s; }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 8px; width: auto; }
    .btn-danger { background: #3f1515; color: #f87171; border: 1px solid #7f1d1d; }
    .btn-ghost { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
    .error-msg { font-size: 12px; color: #f87171; min-height: 16px; }
    .tab-row { display: flex; gap: 8px; }
    .tab-row .btn { flex: 1; opacity: 0.5; }
    .tab-row .btn.active { opacity: 1; }

    /* APP */
    #app { display: none; flex: 1; overflow: hidden; }
    #app.visible { display: flex; }

    /* SIDEBAR */
    .sidebar { width: 280px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-header { padding: 16px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .sidebar-header h2 { font-size: 15px; font-weight: 700; }
    .me-info { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
    .online-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); display: inline-block; }
    .user-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .user-item { padding: 10px 18px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: background 0.15s; border-radius: 8px; margin: 0 6px; }
    .user-item:hover { background: var(--surface2); }
    .user-item.active { background: var(--surface2); border-left: 3px solid var(--accent); padding-left: 15px; }
    .user-item .uname { font-size: 14px; font-weight: 500; }
    .user-item .ustatus { font-size: 11px; color: var(--text-muted); }
    .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .unread-badge { margin-left: auto; background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }

    /* CHAT AREA */
    .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .chat-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface); }
    .chat-header-info { display: flex; align-items: center; gap: 10px; }
    .chat-header h3 { font-size: 15px; font-weight: 700; }
    .chat-header .sub { font-size: 12px; color: var(--text-muted); }
    #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 4px; }
    .msg-row { display: flex; align-items: flex-end; gap: 8px; max-width: 72%; position: relative; animation: fadeIn 0.15s ease; }
    .msg-row.mine { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.theirs, .msg-row.bot-row { align-self: flex-start; }
    .bubble { padding: 9px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-break: break-word; position: relative; }
    .mine .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
    .theirs .bubble { background: var(--surface2); color: var(--text); border-bottom-left-radius: 4px; }
    .bot-row .bubble { background: var(--bot-bg); color: var(--bot-color); border: 1px solid #78350f; border-bottom-left-radius: 4px; }
    .msg-meta { font-size: 10px; color: var(--text-muted); padding: 0 4px; margin-top: 2px; }
    .edited-tag { font-size: 10px; color: rgba(255,255,255,0.5); margin-left: 4px; }
    .theirs .edited-tag { color: var(--text-muted); }
    .msg-actions { display: none; gap: 4px; position: absolute; top: -28px; right: 0; }
    .mine:hover .msg-actions { display: flex; }
    .msg-actions button { padding: 3px 8px; border-radius: 6px; font-size: 11px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); cursor: pointer; }
    .msg-actions button:hover { background: var(--surface2); color: var(--text); }
    .msg-actions .del:hover { color: #f87171; }
    .system-msg { text-align: center; font-size: 12px; color: var(--text-muted); margin: 8px 0; }

    /* INPUT */
    .chat-input-area { padding: 14px 20px; border-top: 1px solid var(--border); background: var(--surface); }
    .commands-hint { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; display: flex; gap: 10px; flex-wrap: wrap; }
    .cmd-chip { background: var(--surface2); padding: 2px 9px; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); }
    .cmd-chip:hover { color: var(--accent2); }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    #msg-input { flex: 1; resize: none; max-height: 120px; min-height: 44px; line-height: 1.5; border-radius: 12px; }
    .send-btn { width: 44px; height: 44px; border-radius: 12px; background: var(--accent); border: none; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.2s; }
    .send-btn:hover { opacity: 0.85; }
    .edit-bar { display: none; padding: 6px 14px; background: #1e1b4b; border-top: 1px solid #3730a3; font-size: 12px; color: var(--accent2); align-items: center; gap: 8px; }
    .edit-bar.visible { display: flex; }
    .edit-bar button { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; }

    /* EMPTY */
    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--text-muted); }
    .empty-state .icon { font-size: 48px; }
    .empty-state p { font-size: 14px; }

    /* TOAST */
    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface2); border: 1px solid var(--border); padding: 10px 20px; border-radius: 12px; font-size: 13px; opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; z-index: 100; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div>
      <h1>💬 Chat App</h1>
      <p>Hackathon 14 · Socket.io + MongoDB</p>
    </div>
    <div class="tab-row">
      <button class="btn btn-primary active" id="tab-login" onclick="switchTab('login')">Iniciar sesión</button>
      <button class="btn btn-ghost" id="tab-register" onclick="switchTab('register')">Registrarse</button>
    </div>
    <div id="form-login" style="display:flex;flex-direction:column;gap:10px">
      <input id="l-email" type="email" placeholder="Correo electrónico" onkeydown="if(event.key==='Enter')login()" />
      <input id="l-pass" type="password" placeholder="Contraseña" onkeydown="if(event.key==='Enter')login()" />
      <button class="btn btn-primary" onclick="login()">Entrar</button>
      <p class="error-msg" id="login-err"></p>
    </div>
    <div id="form-register" style="display:none;flex-direction:column;gap:10px">
      <input id="r-name" type="text" placeholder="Nombre completo" />
      <input id="r-email" type="email" placeholder="Correo electrónico" />
      <input id="r-pass" type="password" placeholder="Contraseña" onkeydown="if(event.key==='Enter')register()" />
      <button class="btn btn-primary" onclick="register()">Crear cuenta</button>
      <p class="error-msg" id="register-err"></p>
    </div>
  </div>
</div>

<div id="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div>
        <h2>Mensajes</h2>
        <div class="me-info"><span class="online-dot"></span><span id="me-name">—</span></div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Salir</button>
    </div>
    <div class="user-list" id="user-list"></div>
  </div>

  <div class="chat-area">
    <div class="empty-state" id="empty-state">
      <div class="icon">💬</div>
      <p>Selecciona un usuario para chatear</p>
    </div>

    <div id="chat-panel" style="display:none;flex:1;flex-direction:column;overflow:hidden">
      <div class="chat-header">
        <div class="chat-header-info">
          <div class="avatar" id="chat-avatar" style="background:var(--accent)">?</div>
          <div>
            <h3 id="chat-with-name">—</h3>
            <div class="sub" id="chat-with-status">—</div>
          </div>
        </div>
        <button class="btn btn-danger btn-sm" onclick="clearHistory()">🗑 Borrar historial</button>
      </div>

      <div id="messages"></div>

      <div class="edit-bar" id="edit-bar">
        ✏️ Editando mensaje
        <button onclick="cancelEdit()">✕ Cancelar</button>
      </div>

      <div class="chat-input-area">
        <div class="commands-hint">
          <span class="cmd-chip" onclick="insertCmd('/bot ')">🤖 /bot [pregunta]</span>
          <span class="cmd-chip" onclick="insertCmd('/clear')">🗑 /clear — borrar historial</span>
        </div>
        <div class="input-row">
          <textarea id="msg-input" placeholder="Escribe un mensaje… (Enter para enviar, Shift+Enter nueva línea)"
            rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" onclick="sendMsg()">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let socket, token, myId, myName;
let currentChat = null;
let editingMsgId = null;
let allUsers = [];
let unread = {};

// ── Tab switch ────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('form-login').style.display = tab === 'login' ? 'flex' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? 'flex' : 'none';
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
}

// ── API helpers ───────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: 'Bearer ' + token } : {}) } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch('/api' + path, opts);
  return r.json();
}

// ── Auth ──────────────────────────────────────────────────────────────────────
async function login() {
  document.getElementById('login-err').textContent = '';
  const d = await api('POST', '/auth/login', { email: v('l-email'), password: v('l-pass') });
  if (d.status === 'ok') { token = d.data; await bootApp(); }
  else document.getElementById('login-err').textContent = d.message || 'Credenciales incorrectas';
}

async function register() {
  document.getElementById('register-err').textContent = '';
  const d = await api('POST', '/auth/register', { nombre: v('r-name'), email: v('r-email'), password: v('r-pass') });
  if (d._id) { toast('Cuenta creada. Inicia sesión.'); switchTab('login'); document.getElementById('l-email').value = v('r-email'); }
  else document.getElementById('register-err').textContent = d.message || 'Error al registrar';
}

function logout() {
  if (socket) socket.disconnect();
  token = myId = myName = currentChat = editingMsgId = null;
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').style.display = 'flex';
}

// ── Boot ──────────────────────────────────────────────────────────────────────
async function bootApp() {
  const me = await api('GET', '/auth/me');
  if (!me._id) return alert('Sesión inválida');
  myId = me._id; myName = me.nombre;
  document.getElementById('me-name').textContent = myName;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  await loadUsers();
  initSocket();
}

async function loadUsers() {
  const d = await api('GET', '/users');
  const users = Array.isArray(d) ? d : (d.data || []);
  allUsers = users.filter(u => u._id !== myId);
  renderUserList();
}

function renderUserList() {
  const ul = document.getElementById('user-list');
  ul.innerHTML = '';
  // Bot first
  ul.appendChild(makeUserEl({ _id: 'bot', nombre: '🤖 Asistente Bot', isOnline: true }));
  allUsers.forEach(u => ul.appendChild(makeUserEl(u)));
}

function makeUserEl(u) {
  const d = document.createElement('div');
  d.className = 'user-item' + (currentChat?.id === u._id ? ' active' : '');
  d.id = 'ui-' + u._id;
  d.onclick = () => openChat(u);

  const av = document.createElement('div');
  av.className = 'avatar';
  av.style.background = u._id === 'bot' ? '#854F0B' : hueColor(u.nombre);
  av.textContent = u.nombre.replace(/[^a-zA-ZÀ-ÿ]/g, '').charAt(0).toUpperCase();

  const info = document.createElement('div');
  info.style.flex = '1';
  info.innerHTML = `<div class="uname">${esc(u.nombre)}</div><div class="ustatus" id="st-${u._id}">${u.isOnline ? '● En línea' : '○ Desconectado'}</div>`;

  d.appendChild(av); d.appendChild(info);
  if (unread[u._id]) { const b = document.createElement('span'); b.className = 'unread-badge'; b.id = 'ub-' + u._id; b.textContent = unread[u._id]; d.appendChild(b); }
  return d;
}

// ── Socket ────────────────────────────────────────────────────────────────────
function initSocket() {
  socket = io();
  socket.emit('setUser', myId);

  socket.on('message', msg => {
    const involved = msg.from === currentChat?.id || msg.to === currentChat?.id;
    if (involved) appendMsg(msg, msg.from === myId);
    else if (msg.from !== myId) { unread[msg.from] = (unread[msg.from] || 0) + 1; refreshBadge(msg.from); }
  });

  socket.on('botMessage', msg => { if (currentChat) appendBotMsg(msg); });

  socket.on('messageDeleted', id => {
    const el = document.getElementById('m-' + id);
    if (el) { el.querySelector('.bubble').innerHTML = '<em style="opacity:.5">🗑 Eliminado</em>'; el.querySelectorAll('.msg-actions').forEach(a => a.remove()); }
  });

  socket.on('messageEdited', ({ id, text }) => {
    const el = document.getElementById('m-' + id);
    if (el) el.querySelector('.bubble').innerHTML = esc(text) + '<span class="edited-tag">(editado)</span>';
  });

  socket.on('historyCleared', () => { document.getElementById('messages').innerHTML = ''; sysMsg('— Historial borrado —'); });

  socket.on('userJoined', uid => { setStatus(uid, true); if (currentChat?.id === uid) document.getElementById('chat-with-status').textContent = 'En línea'; });
  socket.on('userLeft',   uid => { setStatus(uid, false); if (currentChat?.id === uid) document.getElementById('chat-with-status').textContent = 'Desconectado'; });
}

function setStatus(uid, online) {
  const el = document.getElementById('st-' + uid);
  if (el) el.textContent = online ? '● En línea' : '○ Desconectado';
}

// ── Open chat ─────────────────────────────────────────────────────────────────
async function openChat(user) {
  currentChat = { id: user._id, name: user.nombre };
  editingMsgId = null;
  document.getElementById('edit-bar').classList.remove('visible');
  document.getElementById('msg-input').value = '';

  document.querySelectorAll('.user-item').forEach(e => e.classList.remove('active'));
  const ui = document.getElementById('ui-' + user._id);
  if (ui) ui.classList.add('active');

  document.getElementById('chat-avatar').textContent = user.nombre.replace(/[^a-zA-ZÀ-ÿ]/g, '').charAt(0).toUpperCase();
  document.getElementById('chat-avatar').style.background = user._id === 'bot' ? '#854F0B' : hueColor(user.nombre);
  document.getElementById('chat-with-name').textContent = user.nombre;
  document.getElementById('chat-with-status').textContent = user._id === 'bot' ? 'Siempre disponible' : user.isOnline ? 'En línea' : 'Desconectado';

  document.getElementById('empty-state').style.display = 'none';
  const panel = document.getElementById('chat-panel');
  panel.style.display = 'flex';

  unread[user._id] = 0; refreshBadge(user._id);

  const mc = document.getElementById('messages');
  mc.innerHTML = '';

  if (user._id !== 'bot') {
    const d = await api('GET', '/messages/from?from=' + user._id);
    (d.data || []).forEach(m => appendMsg(m, m.from === myId, false));
  } else {
    sysMsg('Escribe /bot [pregunta] o envía un mensaje directo.');
  }

  mc.scrollTop = mc.scrollHeight;
  document.getElementById('msg-input').focus();
}

// ── Render messages ───────────────────────────────────────────────────────────
function appendMsg(msg, isMine, scrollDown = true) {
  const mc = document.getElementById('messages');
  const id = msg._id || msg.id;
  const row = document.createElement('div');
  row.className = 'msg-row ' + (isMine ? 'mine' : 'theirs');
  row.id = 'm-' + id;

  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = esc(msg.text) + (msg.edited ? '<span class="edited-tag">(editado)</span>' : '');

  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  meta.textContent = fmtTime(msg.timestamp);

  row.appendChild(bub);
  if (isMine) {
    const acts = document.createElement('div');
    acts.className = 'msg-actions';
    acts.innerHTML = `<button onclick="startEdit('${id}')">✏️</button><button class="del" onclick="delMsg('${id}')">🗑</button>`;
    row.appendChild(acts);
  }
  row.appendChild(meta);
  mc.appendChild(row);
  if (scrollDown) mc.scrollTop = mc.scrollHeight;
}

function appendBotMsg(msg) {
  const mc = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row bot-row';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.textContent = msg.text;
  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  meta.textContent = '🤖 Bot · ' + fmtTime(msg.timestamp);
  row.appendChild(bub); row.appendChild(meta);
  mc.appendChild(row);
  mc.scrollTop = mc.scrollHeight;
}

function sysMsg(text) {
  const mc = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'system-msg'; d.textContent = text;
  mc.appendChild(d);
}

// ── Actions ───────────────────────────────────────────────────────────────────
function sendMsg() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !currentChat) return;

  if (editingMsgId) {
    socket.emit('editMessage', editingMsgId, text);
    cancelEdit();
  } else {
    socket.emit('sendMessage', currentChat.id, text);
  }
  input.value = ''; autoResize(input);
}

function startEdit(id) {
  editingMsgId = id;
  const bub = document.getElementById('m-' + id)?.querySelector('.bubble');
  const plain = bub?.childNodes[0]?.textContent || bub?.textContent || '';
  const input = document.getElementById('msg-input');
  input.value = plain; input.focus();
  document.getElementById('edit-bar').classList.add('visible');
}

function cancelEdit() {
  editingMsgId = null;
  document.getElementById('edit-bar').classList.remove('visible');
  document.getElementById('msg-input').value = '';
}

function delMsg(id) {
  if (!confirm('¿Eliminar este mensaje?')) return;
  socket.emit('deleteMessage', id);
}

function clearHistory() {
  if (!currentChat || !confirm('¿Borrar todo el historial con ' + currentChat.name + '?')) return;
  socket.emit('clearHistory', currentChat.id);
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function insertCmd(cmd) { const i = document.getElementById('msg-input'); i.value = cmd; i.focus(); }
function refreshBadge(uid) {
  let b = document.getElementById('ub-' + uid);
  const c = unread[uid] || 0;
  if (c > 0) { if (!b) { b = document.createElement('span'); b.className = 'unread-badge'; b.id = 'ub-' + uid; document.getElementById('ui-' + uid)?.appendChild(b); } b.textContent = c; }
  else if (b) b.remove();
}
function fmtTime(ts) { return new Date(typeof ts === 'number' ? ts : ts).toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' }); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function v(id) { return document.getElementById(id).value.trim(); }
function hueColor(s) { let h = 0; for (const c of s) h = c.charCodeAt(0) + ((h << 5) - h); return ['#6c63ff','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#f59e0b'][Math.abs(h) % 6]; }
function toast(msg) { const e = document.getElementById('toast'); e.textContent = msg; e.classList.add('show'); setTimeout(() => e.classList.remove('show'), 3000); }
</script>
</body>
</html>
