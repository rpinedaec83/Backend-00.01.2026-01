<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Courier Online | Tracking en Vivo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="app-shell">
      <header class="hero card reveal">
        <h1>Courier Online Control Center</h1>
        <p id="statusBanner" class="status-banner"></p>
      </header>

      <section class="grid-two">
        <article class="card reveal delay-1">
          <h2>1) Login Cliente</h2>
          <form id="loginForm" class="stack-form">
            <label>Username
              <input id="usernameInput" name="username" placeholder="alice" required />
            </label>
            <button type="submit" class="btn btn-primary">Iniciar Sesion</button>
          </form>
          <p class="mini" id="loginResult">Sin sesion activa.</p>
        </article>

        <article class="card reveal delay-2">
          <h2>2) Crear Paquete</h2>
          <form id="createForm" class="stack-form">
            <label>Remitente
              <input name="sender" placeholder="Tienda Central" required />
            </label>
            <label>Destinatario
              <input name="recipient" placeholder="Carlos Perez" required />
            </label>
            <label>Direccion destino
              <input name="destinationAddress" placeholder="Av. Universitaria 1234" required />
            </label>
            <button type="submit" class="btn btn-secondary">Crear Paquete</button>
          </form>
        </article>
      </section>

      <section class="card reveal delay-3">
        <h2>3) Buscar / Suscribirse a Tracking</h2>
        <form id="trackForm" class="inline-form">
          <input id="trackingInput" name="trackingCode" placeholder="TRK-..." required />
          <button type="submit" class="btn btn-primary">Cargar Paquete</button>
        </form>
        <p class="mini">Tip: luego de crear, el tracking se autocompleta.</p>
      </section>

      <section class="grid-two">
        <article class="card reveal delay-4">
          <h2>4) Operaciones en Vivo</h2>
          <form id="messageForm" class="stack-form">
            <label>Mensaje del paquete
              <textarea name="message" rows="2" placeholder="Paquete en ruta..."></textarea>
            </label>
            <button type="submit" class="btn btn-tertiary">Enviar Mensaje</button>
          </form>

          <form id="locationForm" class="stack-form">
            <div class="grid-mini">
              <label>Latitud
                <input name="latitude" type="number" step="0.000001" placeholder="-12.0464" required />
              </label>
              <label>Longitud
                <input name="longitude" type="number" step="0.000001" placeholder="-77.0428" required />
              </label>
            </div>
            <label>Direccion
              <input name="address" placeholder="Centro de distribucion" />
            </label>
            <label>Nota
              <input name="note" placeholder="Salida del almacen" />
            </label>
            <button type="submit" class="btn btn-secondary">Actualizar Ubicacion</button>
          </form>

          <button id="receiveBtn" class="btn btn-danger">Marcar como Recibido</button>
        </article>

        <article class="card reveal delay-5">
          <h2>Detalle Actual del Paquete</h2>
          <div id="packageMeta" class="meta-box">Sin paquete cargado.</div>
          <h3>Timeline</h3>
          <ul id="timelineList" class="event-list"></ul>
        </article>
      </section>

      <section class="grid-two">
        <article class="card reveal delay-6">
          <h2>Mensajes</h2>
          <ul id="messagesList" class="event-list"></ul>
        </article>

        <article class="card reveal delay-7">
          <h2>Ubicaciones</h2>
          <ul id="locationsList" class="event-list"></ul>
        </article>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js" defer></script>
  </body>
</html>
