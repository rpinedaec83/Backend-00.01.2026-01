version: '3.9'
services:
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: {$DB_USER}
      POSTGRES_PASSWORD: {$DB_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - addressbook-db:/var/lib/postgresql
  addressbook:
    build: 
      context: .
    environment:
      DB_SCHEMA: {$DB_SCHEMA}
      DB_USER: {$DB_USER}
      DB_PASSWORD: {$DB_PASSWORD}
      DB_HOST: {$DB_HOST}
      DB_PORT: {$DB_PORT}
    depends_on:
      - postgres
    ports:
      - '9000:9000'
volumes:
  addressbook-db: